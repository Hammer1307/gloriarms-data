name: Makro-Monitor Datenupdate

# Läuft werktags früh (EU) und nach den US-Veröffentlichungen (Nachmittag).
# Zeiten in UTC. Manueller Start jederzeit über "Run workflow" möglich.
on:
  schedule:
    - cron: "0 5 * * 1-5"    # ~06:00/07:00 MEZ/MESZ
    - cron: "0 14 * * 1-5"   # nach US-Datenreleases (z. B. NFP, Claims)
  workflow_dispatch: {}

# Verhindert überlappende Läufe
concurrency:
  group: marktdaten-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten
        run: pip install requests openpyxl

      - name: Daten aktualisieren (schreibt marktdaten.json nur bei Erfolg)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python update_marktdaten.py

      # Läuft nur, wenn der vorige Schritt erfolgreich war (sonst bleibt der
      # letzte gute Stand in R2 unangetastet).
      - name: JSON nach Cloudflare R2 laden
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@3 r2 object put \
            "${{ secrets.R2_BUCKET }}/marktdaten.json" \
            --file marktdaten.json \
            --content-type "application/json" \
            --cache-control "public, max-age=300"
