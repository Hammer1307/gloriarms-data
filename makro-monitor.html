<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0D1F4E;--panel:#FFFFFF;--panel2:#EEF1F7;--line:rgba(13,31,78,.10);--line-nav:rgba(255,255,255,.16);--tx:#EAEDF6;--ink:#1A2342;--mut:#A7AFCB;--mut-ink:#5A607A;--gold:#C8A84B;--sent:#e0245e;--comm:#C8A84B;--lab:#3ba776;--eu:#3b82f6;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
header{border-bottom:1px solid var(--line-nav)}
.hwrap{max-width:1280px;margin:0 auto;padding:22px 28px}
.htop{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
h1{margin:0;font-size:21px;letter-spacing:.3px}
.sub{color:var(--mut);font-size:13px;margin-top:4px}
.langsw{font-size:12px;color:var(--mut);white-space:nowrap}
.langsw a{color:var(--mut);text-decoration:none;padding:2px 6px;border:1px solid var(--line-nav);border-radius:6px;margin-left:4px}
.langsw a.active{color:#fff;border-color:var(--gold)}
.wrap{padding:22px 28px;max-width:1280px;margin:0 auto}
.secttl{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);margin:26px 0 12px;display:flex;align-items:center;gap:10px}
.secttl::before{content:"";width:10px;height:10px;border-radius:3px;background:var(--dot)}
.s1{--dot:var(--sent)}.s2{--dot:var(--lab)}.s3{--dot:var(--eu)}
.subgrp{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin:14px 0 8px;opacity:.8}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;color:var(--ink);box-shadow:0 4px 14px rgba(5,14,38,.20)}
.card.sent{border-left:3px solid var(--sent)}.card.comm{border-left:3px solid var(--comm)}
.card.lab{border-left:3px solid var(--lab)}.card.eu{border-left:3px solid var(--eu)}
.card .t{font-size:12px;color:var(--mut-ink);margin-bottom:6px}
.card .v{font-size:24px;font-weight:600}
.card .b{margin-top:6px;font-size:12px;display:flex;gap:8px;align-items:center}
.card .asof{margin-top:8px;font-size:10.5px;color:var(--mut-ink);opacity:.85;border-top:1px solid var(--line);padding-top:6px}
.d.up{color:#1E9E48}.d.dn{color:#DD4A42}.u{color:var(--mut-ink)}
.charts{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:16px}
.chart{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;color:var(--ink);box-shadow:0 4px 14px rgba(5,14,38,.20)}
.chart h3{margin:0 0 10px;font-size:14px;font-weight:600}
.chart .cw{position:relative;height:220px}
.chart .expl{margin-top:10px;font-size:11.5px;line-height:1.55;color:var(--mut-ink);border-top:1px solid var(--line);padding-top:9px}
@media(max-width:820px){.charts{grid-template-columns:1fr}}
footer{color:var(--mut);font-size:12px;border-top:1px solid var(--line-nav);margin-top:26px;line-height:1.6}
footer p{margin:8px 0}footer b{color:#aab6d0}
.ftitle{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);margin-bottom:8px}
.badge{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--mut-ink);margin-left:8px}
#status{display:none;background:#3a1720;border:1px solid #e0245e;color:#ffb3c1;border-radius:8px;padding:10px 14px;margin:14px 0;font-size:13px}
</style></head><body>

/* ---------------- setup ---------------- */
const LANGS=["de","en","it"];
const P=new URLSearchParams(location.search);
let LANG=(P.get("lang")||window.__LANG__||"de").toLowerCase();
if(!LANGS.includes(LANG)) LANG="de";
const LOC={de:"de-DE",en:"en-US",it:"it-IT"}[LANG];
const T=I18N[LANG];
document.documentElement.setAttribute("lang",LANG);
const MUT="#5A607A", GRID="rgba(13,31,78,.08)";
const nf=(n,dec)=>Number(n).toLocaleString(LOC,{minimumFractionDigits:dec,maximumFractionDigits:dec});

function cardValue(c){
  switch(c.kind){
    case "cur": return "$"+nf(c.raw,2);
    case "signk": return (c.raw>=0?"+":"")+nf(c.raw,0)+" "+T.units.k;
    case "k": return nf(c.raw,0)+" "+T.units.k;
    case "pct": return nf(c.raw,c.dec)+"%";
    default: return nf(c.raw,c.dec);
  }
}
function unitLabel(c){ return c.unit==="usdlevel" ? "USD "+nf(c.extra,2) : (T.units[c.unit]||c.unit); }
function asofLabel(c){
  const p=c.asof.split("-"), y=p[0], m=p[1], dd=p[2];
  if(c.freq==="m") return T.months[parseInt(m,10)-1]+" "+y;
  if(LANG==="en") return T.months[parseInt(m,10)-1]+" "+parseInt(dd,10)+", "+y;
  if(LANG==="it") return dd+"/"+m+"/"+y;
  return dd+"."+m+"."+y;
}

/* ---------------- static text ---------------- */
function fillStatic(){
  document.getElementById("sub").textContent=T.headerSub;
  document.getElementById("sec1").textContent=T.sections.s1;
  document.getElementById("sec2").textContent=T.sections.s2;
  document.getElementById("sec3").textContent=T.sections.s3;
  document.getElementById("sub-sent").textContent=T.subgroups.sent;
  document.getElementById("sub-comm").textContent=T.subgroups.comm;
  document.getElementById("footer-content").innerHTML=
    '<div class="ftitle">'+T.footer.title+'</div>'+
    '<p>'+T.footer.sources+'</p><p>'+T.footer.notes+'</p><p>'+T.footer.disclaimer+'</p>';
  const sw=document.getElementById("langsw");
  sw.innerHTML=LANGS.map(l=>{
    const u=new URL(location.href); u.searchParams.set("lang",l);
    return '<a href="'+u.pathname+u.search+'" class="'+(l===LANG?"active":"")+'">'+l.toUpperCase()+'</a>';
  }).join("");
}

/* ---------------- cards ---------------- */
function renderCards(cards){
  const box={sent:document.getElementById("g-sent"),comm:document.getElementById("g-comm"),
             lab:document.getElementById("g-lab"),eu:document.getElementById("g-eu")};
  cards.forEach(c=>{
    const unitEl='<span class="u">'+unitLabel(c)+'</span>';
    let badge;
    if(c.delta===null||c.delta===undefined){ badge=unitEl; }
    else{ const up=c.delta>=0; badge='<span class="d '+(up?"up":"dn")+'">'+(up?"▲":"▼")+" "+nf(Math.abs(c.delta),1)+'</span>'+unitEl; }
    const note=c.note?(" · "+T.notes[c.note]):"";
    const el=document.createElement("div");
    el.className="card "+c.group;
    el.innerHTML='<div class="t">'+T.cards[c.id]+'</div><div class="v">'+cardValue(c)+'</div>'+
                 '<div class="b">'+badge+'</div><div class="asof">'+T.asOf+" "+asofLabel(c)+note+'</div>';
    (box[c.group]||box.sent).appendChild(el);
  });
}

/* ---------------- charts ---------------- */
const CHARTDEFS=[
  {sec:1,key:"vix",canvas:"cVix"},{sec:1,key:"spread",canvas:"cSpread"},{sec:1,key:"oil",canvas:"cOil"},
  {sec:1,key:"gold",canvas:"cGold"},{sec:1,key:"gas",canvas:"cGas"},{sec:1,key:"copper",canvas:"cCopper"},
  {sec:2,key:"nfp",canvas:"cNfp"},{sec:2,key:"unemp",canvas:"cUnemp"},{sec:2,key:"claims",canvas:"cClaims"},
  {sec:3,key:"esi",canvas:"cEsi"},{sec:3,key:"conf",canvas:"cConf"}
];
function buildChartDom(){
  CHARTDEFS.forEach(cd=>{
    const el=document.createElement("div"); el.className="chart";
    el.innerHTML='<h3>'+T.chartTitles[cd.key]+'</h3><div class="cw"><canvas id="'+cd.canvas+'"></canvas></div>'+
                 '<div class="expl">'+T.expl[cd.key]+'</div>';
    document.getElementById("charts-"+cd.sec).appendChild(el);
  });
}
function drawCharts(S){
  Chart.defaults.color=MUT; Chart.defaults.font.size=11;
  const base=()=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{grid:{color:GRID},ticks:{maxTicksLimit:6}},y:{grid:{color:GRID}}}});
  const leg=()=>({...base(),plugins:{legend:{display:true,labels:{boxWidth:12}}}});
  const line=(id,l,v,c,f)=>new Chart(document.getElementById(id),{type:'line',
    data:{labels:l,datasets:[{data:v,borderColor:c,backgroundColor:f,borderWidth:2,fill:!!f,tension:.25,pointRadius:0}]},options:base()});
  line("cVix",S.vix.l,S.vix.v,'#e0245e','rgba(224,36,94,.12)');
  line("cGold",S.gold.l,S.gold.v,'#C8A84B','rgba(200,168,75,.14)');
  line("cGas",S.gas.l,S.gas.v,'#3b82f6','rgba(59,130,246,.12)');
  line("cCopper",S.copper.l,S.copper.v,'#c2703d','rgba(194,112,61,.14)');
  line("cUnemp",S.unemp.l,S.unemp.v,'#8b5cf6','rgba(139,92,246,.12)');
  line("cClaims",S.claims.l,S.claims.v,'#ef4444','rgba(239,68,68,.10)');
  line("cEsi",S.esi.l,S.esi.v,'#3b82f6','rgba(59,130,246,.12)');
  new Chart(document.getElementById("cSpread"),{type:'line',data:{labels:S.btp.l,datasets:[
    {label:T.legends.btp,data:S.btp.v,borderColor:'#e0245e',borderWidth:2,pointRadius:0,tension:.2},
    {label:T.legends.oat,data:S.oat.v,borderColor:'#3ba776',borderWidth:2,pointRadius:0,tension:.2}]},options:leg()});
  new Chart(document.getElementById("cOil"),{type:'line',data:{labels:S.brent.l,datasets:[
    {label:T.legends.brent,data:S.brent.v,borderColor:'#C8A84B',borderWidth:2,pointRadius:0,tension:.2},
    {label:T.legends.wti,data:S.wti.v,borderColor:'#2dd4bf',borderWidth:2,pointRadius:0,tension:.2}]},options:leg()});
  new Chart(document.getElementById("cConf"),{type:'line',data:{labels:S.esi.l,datasets:[
    {label:T.legends.ind,data:S.ind.v,borderColor:'#e0245e',borderWidth:2,pointRadius:0,tension:.2},
    {label:T.legends.cons,data:S.cons.v,borderColor:'#3b82f6',borderWidth:2,pointRadius:0,tension:.2},
    {label:T.legends.svc,data:S.svc.v,borderColor:'#3ba776',borderWidth:2,pointRadius:0,tension:.2}]},options:leg()});
  new Chart(document.getElementById("cNfp"),{type:'bar',data:{labels:S.nfp.l,datasets:[
    {data:S.nfp.v,backgroundColor:S.nfp.v.map(v=>v>=0?'#3ba776':'#e0245e')}]},options:base()});
}

function showError(msg){
  const s=document.getElementById("status");
  s.style.display="block"; s.textContent=msg;
  document.getElementById("badge").textContent="—";
}
function pad(n){return String(n).padStart(2,"0");}
function fmtGen(iso){
  const g=new Date(iso);
  const d=(LANG==="en")?(T.months[g.getUTCMonth()]+" "+g.getUTCDate()+", "+g.getUTCFullYear())
        :(LANG==="it")?(pad(g.getUTCDate())+"/"+pad(g.getUTCMonth()+1)+"/"+g.getUTCFullYear())
        :(pad(g.getUTCDate())+"."+pad(g.getUTCMonth()+1)+"."+g.getUTCFullYear());
  return T.updated+" "+d+" "+pad(g.getUTCHours())+":"+pad(g.getUTCMinutes())+" UTC";
}

async function init(){
  fillStatic();
  try{
    const d=(typeof window.__PRELOAD__!=="undefined")?window.__PRELOAD__
            :await (await fetch("marktdaten.json?ts="+Date.now(),{cache:"no-store"})).json();
    document.getElementById("badge").textContent=fmtGen(d.generatedAt);
    renderCards(d.cards);
    buildChartDom();
    drawCharts(d.series);
  }catch(e){
    showError(T.statusErr+" ("+e.message+").");
  }
}
init();
