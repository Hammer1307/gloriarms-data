name: Trigger gloriarms.com rebuild

# When the monthly PMI job (or the Makro job) commits fresh data, ping the site
# host's build hook so Astro rebuilds and the on-domain pages show new values.
on:
  push:
    branches: [main]
    paths:
      - "pmi_data.json"
      - "marktdaten.json"
  workflow_dispatch: {}

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Call site deploy hook
        run: curl -fsSL -X POST "${{ secrets.SITE_BUILD_HOOK_URL }}"
