name: Makro-Monitor Datenupdate

# Laeuft werktags frueh (EU) und nach den US-Releases (Nachmittag). Zeiten in UTC.
# Manueller Start jederzeit ueber "Run workflow".
on:
  schedule:
    - cron: "0 5 * * 1-5"    # ~06:00/07:00 MEZ/MESZ
    - cron: "0 14 * * 1-5"   # nach US-Datenreleases (NFP, Claims, ...)
  workflow_dispatch: {}

concurrency:
  group: marktdaten-update
  cancel-in-progress: false

# Erlaubt dem eingebauten GITHUB_TOKEN, die aktualisierte JSON zu committen.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # inkl. Wartezeit, bis Pages/raw die neue JSON ausliefern
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten
        run: pip install requests openpyxl

      # Schreibt marktdaten.json NUR bei Erfolg. Schlaegt der Abruf fehl,
      # bricht dieser Schritt ab -> es wird nichts committet -> letzter guter Stand bleibt.
      - name: Daten aktualisieren
        env:
          # Offizielle FRED-API (kostenloser Key). OHNE diesen Key faellt das Skript
          # auf fredgraph.csv zurueck - und das blockiert FRED von GitHub-Runnern.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python update_marktdaten.py

      # Business Cycle Monitor: OECD-SDMX (CLI + BCI) + EU-Kommission (ESI fuer
      # Eurozone/Irland). Braucht keinen Key. Bricht ab, wenn zu wenige Laender
      # Daten liefern -> dann wird nichts committet, letzter guter Stand bleibt.
      - name: Business-Cycle-Daten aktualisieren
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python businesscycle_updater.py

      - name: Aktualisierte JSON-Dateien committen (nur bei Aenderung)
        id: commit
        run: |
          if [ -n "$(git status --porcelain marktdaten.json businesscycle_data.json)" ]; then
            git config user.name "gloriarms-data-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add marktdaten.json businesscycle_data.json
            git commit -m "Daten-Update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Keine Aenderungen - nichts zu committen."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # WICHTIG: Ohne diesen Schritt haengt die Webseite dauerhaft EINEN Lauf
      # hinterher. Grund: Der Commit ist zwar sofort in main, aber GitHub Pages
      # braucht ~1 Minute, bis es die neue JSON ausliefert. Feuert der Deploy-Hook
      # direkt nach dem Commit, holt sich der Astro-Build noch die ALTE Datei.
      # Deshalb warten wir, bis die neue Datei wirklich abrufbar ist, und stossen
      # den Rebuild erst danach an.
      - name: Warten bis die neue JSON oeffentlich abrufbar ist
        if: steps.commit.outputs.changed == 'true'
        run: |
          WANT=$(python3 -c "import json;print(json.load(open('marktdaten.json'))['generatedAt'])")
          echo "Erwarteter Stand: $WANT"
          for URL in \
            "https://hammer1307.github.io/gloriarms-data/marktdaten.json" \
            "https://raw.githubusercontent.com/Hammer1307/gloriarms-data/main/marktdaten.json"
          do
            OK=0
            for i in $(seq 1 30); do   # bis zu 5 Minuten je Quelle
              GOT=$(curl -fsS -H 'Cache-Control: no-cache' "$URL?cb=$(date +%s)" \
                    | python3 -c "import sys,json;print(json.load(sys.stdin).get('generatedAt',''))" 2>/dev/null || echo "")
              if [ "$GOT" = "$WANT" ]; then
                echo "OK  $URL  (nach $((i*10))s)"
                OK=1
                break
              fi
              sleep 10
            done
            if [ "$OK" != "1" ]; then
              echo "FEHLER: $URL liefert nach 5 Minuten immer noch '$GOT' statt '$WANT'."
              echo "Rebuild wird NICHT angestossen - sonst baut die Webseite den alten Stand ein."
              exit 1
            fi
          done

      - name: Webseiten-Rebuild anstossen (Deploy-Hook)
        if: steps.commit.outputs.changed == 'true'
        run: |
          if [ -z "${{ secrets.SITE_BUILD_HOOK_URL }}" ]; then
            echo "SITE_BUILD_HOOK_URL nicht gesetzt - Webseite wird NICHT neu gebaut."
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.SITE_BUILD_HOOK_URL }}" > /dev/null
          echo "Webseiten-Rebuild angestossen (neue Daten sind nachweislich abrufbar)."
